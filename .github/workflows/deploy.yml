name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/reelmind_deploy
          chmod 600 ~/.ssh/reelmind_deploy
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          ssh -i ~/.ssh/reelmind_deploy \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'sudo mkdir -p /opt/reelmind-web/html && sudo chown -R "$USER:$USER" /opt/reelmind-web'

          rsync -az --delete \
            -e "ssh -i ~/.ssh/reelmind_deploy -p ${{ secrets.SERVER_PORT }}" \
            dist/ \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/reelmind-web/html/"

          rsync -az \
            -e "ssh -i ~/.ssh/reelmind_deploy -p ${{ secrets.SERVER_PORT }}" \
            nginx.conf docker-compose.yml scripts/deploy-production.sh \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/reelmind-web/"

      - name: Deploy over SSH
        run: |
          ssh -i ~/.ssh/reelmind_deploy \
            -p "${{ secrets.SERVER_PORT }}" \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            'bash -s' <<'REMOTE'
          set -euo pipefail

          APP_DIR="/opt/reelmind-web"
          sudo chmod +x "$APP_DIR/deploy-production.sh"

          APP_DIR="$APP_DIR" bash "$APP_DIR/deploy-production.sh"
          REMOTE
